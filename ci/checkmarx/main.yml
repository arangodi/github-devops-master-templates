parameters:
  - name: cx_group
    type: string
    default: "CxColombia"
  - name: scan_timeout
    type: number
    default: 15

steps:
  # Invocar Lambda
  - task: AmazonWebServices.aws-vsts-tools.LambdaInvokeFunction.LambdaInvokeFunction@1
    displayName: "Fetch Checkmarx Config for $(Build.Repository.Name)"
    inputs:
      awsCredentials: 'SVC-SERVICE-IDP-MULTIPROJECTS-PDN'
      regionName: 'us-east-1'
      functionName: 'func-Checkmarx-Repo-Search-pdn'
      payload: |
        {
          "repoName":"$(Build.Repository.Name)"
        }
      outputVariable: response
      logType: Tail

  # Parsear respuesta y setear variables
  - task: CmdLine@2
    displayName: "Parse Lambda Response and Set Checkmarx Variables"
    name: setVars
    inputs:
      script: |
        echo "Lambda Response: $(response)"

        isCritical=$(echo "$(response)" | grep -oE '"checkmarx_enabled": (true|false)' | grep -oE '(true|false)')
        echo "##vso[task.setvariable variable=checkmarx]$isCritical"

        if [[ "$isCritical" == "true" ]]; then
          appId=$(echo "$(response)" | grep -oE '"id": [0-9]+' | grep -oE '[0-9]+')
          appName=$(echo "$(response)" | grep -oE '"appName": "[^"]+"' | sed 's/"appName": "//;s/"$//')

          echo "##vso[task.setvariable variable=appId]$appId"
          echo "##vso[task.setvariable variable=appName]$appName"
        fi

  # Ejecutar Checkmarx SOLO si checkmarx == true
  - task: Checkmarx AST@3
    displayName: "Checkmarx AST Scan - SAST & SCA ($(Build.Repository.Name))"
    condition: eq(variables['checkmarx'], 'true')
    inputs:
      CheckmarxService: 'Checkmarx-One'
      projectName: '$(System.TeamProject)-REP-$(Build.Repository.Name)'
      branchName: '$(Build.SourceBranchName)'
      tenantName: 'btg'
      additionalParams: >
        --scan-types sast,sca
        --sast-incremental=true
        --scan-timeout ${{ parameters.scan_timeout }}
        --project-groups "${{ parameters.cx_group }}"
        --project-tags "repositorio:$(Build.Repository.Name),
                        repositorio_id:$(Build.Repository.ID),
                        pipeline:$(Build.DefinitionName),
                        pipeline_id:$(System.DefinitionId),
                        id_aplicacao:$(appId),
                        plataforma_de_desenvolvimento:Azure,
                        branch:$(Build.SourceBranchName)"
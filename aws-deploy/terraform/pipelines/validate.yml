# ══════════════════════════════════════════════════════════════
# TEMPLATE: Terraform Config Validation
# ══════════════════════════════════════════════════════════════
# Este template valida archivos de configuración de Terraform y tags
# usando validators Python personalizados
# ══════════════════════════════════════════════════════════════

parameters: []

stages:
  - stage: Validate
    displayName: "✅ Validar config + tags"

    variables:
      - name: versionValidate
        value: '3.12'

    jobs:
      - job: ValidateConfig
        displayName: "validators/main.py + tag validator"

        steps:
          # ==========================================
          # CHECKOUTS
          # ==========================================
          - checkout: self
            path: $(Build.BuildId)/infra
            fetchDepth: 0
            displayName: "Checkout infra"
            persistCredentials: true

          - checkout: devops-master-templates
            path: $(Build.BuildId)/iac
            fetchDepth: 1
            displayName: "Checkout devops-master-templates"
            persistCredentials: true

          # ==========================================
          # VERIFICAR VERSIÓN DE PYTHON
          # ==========================================
          - bash: |
              set -e
              echo "===================================="
              echo " VERIFICANDO PYTHON $(versionValidate)"
              echo "===================================="

              if command -v python$(versionValidate) &> /dev/null; then
                echo "✅ python$(versionValidate) encontrado"
                python$(versionValidate) --version
              else
                echo "❌ ERROR: python$(versionValidate) no está disponible en el agente"
                echo "Versiones de Python disponibles:"
                ls -la /usr/bin/python* 2>/dev/null || true
                exit 1
              fi

            displayName: "Validar Version de Python $(versionValidate)"

